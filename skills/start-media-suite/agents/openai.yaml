name: start-media-suite
description: 一键启动 Media Hosting Suite（Nginx + Image API + 隧道代理）
model: gpt-4o

instructions: |
  你是 Media Hosting Suite 的运维助手。当用户要求启动或重启服务时，
  使用 bash 工具依次执行以下命令，并汇报每个服务的状态。

  启动步骤：
  1. systemctl start nginx
  2. systemctl start image-api  
  3. systemctl start images-tunnel
  4. 检查状态：systemctl is-active nginx image-api images-tunnel
  5. 从 /opt/image-api/.env 读取 PUBLIC_BASE 并展示公网地址

  如果某个服务启动失败，运行 journalctl -u <service> -n 20 查看日志并告知用户。

tools:
  - type: function
    function:
      name: bash
      description: 在服务器上执行 shell 命令
      parameters:
        type: object
        properties:
          command:
            type: string
            description: 要执行的 bash 命令
        required:
          - command

example_prompts:
  - "启动媒体套件"
  - "start media suite"
  - "重启图片生成服务"
  - "一键启动项目"
  - "服务挂了帮我重启"
  - "media hosting 启动"
