interface:
  display_name: "Domain Bootstrap"
  short_description: "新项目一键开通公网域名：注册、安装agent、绑定自定义域名。"
  default_prompt: |
    Goal: Bootstrap public domain access for a new local project end-to-end.

    Execution flow:
    1) Parse user message:
       - PROJECT_NAME (default: "app")
       - PORT (required, default: 3000 if missing)
       - USER_ID (default: "1001")
       - BASE_DOMAIN (default: "vyibc.com")
       - OPTIONAL_HOSTNAME (user desired full hostname, e.g. api.vyibc.com)

    2) Register initial session:
       curl -sS -X POST 'https://domain.vyibc.com/api/sessions/register' \
         -H 'Content-Type: application/json' \
         -d '{
           "user_id":"{USER_ID}",
           "project":"{PROJECT_NAME}",
           "target":"127.0.0.1:{PORT}",
           "base_domain":"{BASE_DOMAIN}"
         }'

    3) Parse response:
       - public_url
       - tunnel.id
       - tunnel.token
       - route.hostname
       - agent_command

    4) If OPTIONAL_HOSTNAME is provided, bind it:
       curl -sS -X POST 'https://domain.vyibc.com/api/routes' \
         -H 'Content-Type: application/json' \
         -d '{
           "tunnel_id":"<tunnel_id>",
           "hostname":"<OPTIONAL_HOSTNAME>",
           "target":"127.0.0.1:{PORT}",
           "enabled":true
         }'
       - If success: final domain = OPTIONAL_HOSTNAME
       - If 409 conflict: explain conflict and ask user for another hostname via ask_user tool.
       - Retry hostname binding up to 3 times before fallback to auto domain.

    5) If OPTIONAL_HOSTNAME is not provided:
       - Present auto-generated domain first.
       - Ask user via ask_user whether to keep it or provide a custom hostname.
       - If user provides custom hostname, run step 4.

    6) Provide runnable agent setup commands:
       - Download:
         curl -fL -o /root/agent https://github.com/ChangfengHU/tunneling/releases/latest/download/agent-linux-amd64
         chmod +x /root/agent
       - Start:
         nohup /root/agent -server ws://152.32.214.95/connect -token <token> \
           -route-sync-url http://152.32.214.95/_tunnel/agent/routes \
           -tunnel-id <tunnel_id> -tunnel-token <token> \
           -admin-addr 127.0.0.1:17001 >/var/log/tunnel-agent.log 2>&1 &

    7) Final response format:
       ✅ 域名开通完成
       - Auto Domain: <auto_domain>
       - Final Domain: <final_domain>
       - URL: <final_url>
       - Tunnel ID: <tunnel_id>
       - Token: <token>
       - Agent Command: <agent_command or expanded command>
       - 如果用户指定域名冲突，明确列出冲突原因和下一步建议

    Important:
    - Never hide API errors; surface exact status/body summary.
    - Always ensure user gets a usable domain (custom if available, otherwise auto-generated).
    - Keep instructions practical and executable.

policy:
  allow_implicit_invocation: true

